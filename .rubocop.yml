AllCops:
  TargetRubyVersion: 3.3
  NewCops: disable
  SuggestExtensions: false

Style/Documentation:
  Exclude:
    - "lib/railsdx.rb"
    - "test/**/*"

# Test files routinely exceed length/complexity metrics by design (long setup,
# many assertions per test). Rails generators are structurally similar —
# many small thor-style public actions plus per-target install methods. The
# Metrics cops are signal-positive for app code but noise here.
Metrics/ClassLength:
  Exclude:
    - "test/**/*"
    - "lib/generators/**/*"

Metrics/MethodLength:
  Exclude:
    - "test/**/*"
    - "lib/generators/**/*"

Metrics/AbcSize:
  Exclude:
    - "test/**/*"
    - "lib/generators/**/*"

Metrics/BlockLength:
  Exclude:
    - "test/**/*"

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes
